<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Bella — Awards</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Imperial+Script&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
    header {
      position: fixed; top: 0; left: 0; right: 0; height: 60px;
      display: flex; align-items: center; padding: 0 28px; z-index: 10;
    }
    .back-link {
      color: rgba(210,168,65,0.75); font-family: 'Imperial Script', cursive;
      font-size: 18px; text-decoration: none; transition: color 0.2s;
    }
    .back-link:hover { color: #7aaeff; }
    .page-title {
      font-family: 'Imperial Script', cursive; font-size: 32px;
      font-weight: 400; color: rgba(210,168,65,0.85); margin-left: 24px;
    }
    canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <header>
    <a href="https://sheisone1.github.io/string-curtain/index.html?open=1" class="back-link">← Back</a>
    <h1 class="page-title">Awards</h1>
  </header>

  <script>
  const canvas = document.getElementById('c');
  const ctx    = canvas.getContext('2d');
  let W, H, dpr;
  const HEADER = 60;

  // ── Load face image ───────────────────────────────────────────────────────
  const img = new Image();
  img.src = 'face.png';

  // ── Face outline path – normalized [fx, fy] within image rect ────────────
  // Traced from the line art: hair → forehead → eye → nose → lips → chin → neck → shoulder
  const FACE_PATH = [
    [0.41, 0.00],  // hair peak (curl at top)
    [0.38, 0.04],  // hair base
    [0.43, 0.09],  // forehead top
    [0.45, 0.18],  // mid forehead
    [0.44, 0.27],  // brow
    [0.45, 0.33],  // eye
    [0.48, 0.38],  // nose bridge
    [0.54, 0.44],  // nose tip
    [0.52, 0.49],  // upper lip
    [0.50, 0.54],  // mouth
    [0.47, 0.59],  // lower lip
    [0.45, 0.64],  // chin
    [0.41, 0.69],  // jaw
    [0.43, 0.76],  // upper neck
    [0.44, 0.83],  // lower neck
    [0.39, 0.90],  // collarbone
    [0.33, 0.97],  // shoulder
  ];

  // Catmull-Rom spline: get [fx, fy] at parameter t ∈ [0, 1]
  function pathPoint(t) {
    const n = FACE_PATH.length - 1;
    const seg = Math.min(Math.floor(t * n), n - 1);
    const lt  = t * n - seg;
    const p0  = FACE_PATH[Math.max(0,   seg - 1)];
    const p1  = FACE_PATH[seg];
    const p2  = FACE_PATH[Math.min(n,   seg + 1)];
    const p3  = FACE_PATH[Math.min(n,   seg + 2)];
    const cr  = (a, b, c, d, s) => 0.5 * (
      2*b + (-a+c)*s + (2*a-5*b+4*c-d)*s*s + (-a+3*b-3*c+d)*s*s*s
    );
    return [ cr(p0[0],p1[0],p2[0],p3[0],lt), cr(p0[1],p1[1],p2[1],p3[1],lt) ];
  }

  // ── Awards placed at t-positions along the face path ─────────────────────
  const AWARDS = [
    { t:0.04, side:'right', label:"Palme d'Or",          sub:"Cannes 2025",    size:2.0, phase:0.0 },
    { t:0.18, side:'left',  label:"Best Score",          sub:"Edinburgh 2025", size:1.1, phase:2.5 },
    { t:0.30, side:'left',  label:"Best Director",       sub:"TIFF 2025",      size:1.6, phase:1.1 },
    { t:0.42, side:'right', label:"Grand Prix",          sub:"Tribeca 2025",   size:1.5, phase:2.2 },
    { t:0.52, side:'left',  label:"Jury Prize",          sub:"Venice 2025",    size:1.3, phase:0.7 },
    { t:0.62, side:'right', label:"Best Cinematography", sub:"Sundance 2025",  size:1.4, phase:1.8 },
    { t:0.74, side:'left',  label:"Best Feature",        sub:"Berlin 2025",    size:1.4, phase:3.1 },
    { t:0.88, side:'right', label:"Audience Award",      sub:"Rotterdam 2025", size:1.1, phase:0.4 },
  ];

  // ── Face image rect ───────────────────────────────────────────────────────
  function faceRect() {
    const ih  = (H - HEADER) * 0.88;
    const aspect = img.naturalHeight > 0 ? img.naturalWidth / img.naturalHeight : 0.74;
    const iw  = ih * aspect;
    const ix  = (W - iw) / 2;
    const iy  = HEADER + (H - HEADER) * 0.06;
    return { ix, iy, iw, ih };
  }

  // ── Draw glowing star ─────────────────────────────────────────────────────
  function drawStar(x, y, size, time, phase) {
    const pulse = 0.72 + 0.28 * Math.sin(time * 0.0017 + phase);
    const gR = size * 16 * pulse;

    const g = ctx.createRadialGradient(x, y, 0, x, y, gR);
    g.addColorStop(0,    `rgba(255,242,200,${0.65 * pulse})`);
    g.addColorStop(0.25, `rgba(210,168,65,${0.28 * pulse})`);
    g.addColorStop(0.7,  `rgba(210,168,65,${0.05 * pulse})`);
    g.addColorStop(1,    'rgba(0,0,0,0)');
    ctx.beginPath(); ctx.arc(x, y, gR, 0, Math.PI * 2);
    ctx.fillStyle = g; ctx.fill();

    const sLen = size * 9 * pulse;
    for (let i = 0; i < 4; i++) {
      const ang = i * Math.PI / 2 + time * 0.00012;
      const sg  = ctx.createLinearGradient(x, y,
        x + Math.cos(ang) * sLen, y + Math.sin(ang) * sLen);
      sg.addColorStop(0, `rgba(255,248,220,${0.6 * pulse})`);
      sg.addColorStop(1,  'rgba(210,168,65,0)');
      ctx.beginPath(); ctx.moveTo(x, y);
      ctx.lineTo(x + Math.cos(ang) * sLen, y + Math.sin(ang) * sLen);
      ctx.strokeStyle = sg; ctx.lineWidth = 0.8; ctx.stroke();
    }

    const cg = ctx.createRadialGradient(x, y, 0, x, y, size * 2.5);
    cg.addColorStop(0, `rgba(255,255,245,${0.95 * pulse})`);
    cg.addColorStop(1,  'rgba(210,168,65,0.3)');
    ctx.beginPath(); ctx.arc(x, y, size * 2.5, 0, Math.PI * 2);
    ctx.fillStyle = cg; ctx.fill();
  }

  // ── Draw award label ──────────────────────────────────────────────────────
  function drawLabel(x, y, label, sub, size, time, phase, side) {
    const pulse  = 0.72 + 0.28 * Math.sin(time * 0.0017 + phase);
    const alpha  = 0.65 + 0.35 * pulse;
    const fSize  = Math.round(9 + size * 3);
    const isLeft = side === 'left';
    const offX   = isLeft ? -(size * 26 + 16) : (size * 26 + 16);

    ctx.textAlign    = isLeft ? 'right' : 'left';
    ctx.textBaseline = 'middle';
    ctx.font      = `${fSize}px 'Imperial Script', cursive`;
    ctx.fillStyle = `rgba(210,168,65,${alpha})`;
    ctx.fillText(label, x + offX, y);
    ctx.font      = `${Math.round(fSize * 0.70)}px 'Imperial Script', cursive`;
    ctx.fillStyle = `rgba(122,174,255,${alpha * 0.82})`;
    ctx.fillText(sub, x + offX, y + fSize * 1.1);
  }

  // ── Main draw loop ─────────────────────────────────────────────────────────
  function draw(time) {
    if (!img.complete || !img.naturalWidth) { requestAnimationFrame(draw); return; }
    ctx.clearRect(0, 0, W, H);

    const { ix, iy, iw, ih } = faceRect();
    const pulse = 0.88 + 0.12 * Math.sin(time * 0.0007);

    // Gold filter: invert black→white lines, sepia+saturate→gold tones
    const gold = 'invert(1) sepia(1) saturate(5) hue-rotate(10deg) brightness(1.25)';

    // Multi-pass glow (same technique as thread lines)
    ctx.save(); ctx.globalAlpha = 0.10 * pulse;
    ctx.filter = `blur(24px) ${gold}`;
    ctx.drawImage(img, ix, iy, iw, ih); ctx.restore();

    ctx.save(); ctx.globalAlpha = 0.18 * pulse;
    ctx.filter = `blur(13px) ${gold}`;
    ctx.drawImage(img, ix, iy, iw, ih); ctx.restore();

    ctx.save(); ctx.globalAlpha = 0.32 * pulse;
    ctx.filter = `blur(6px) ${gold}`;
    ctx.drawImage(img, ix, iy, iw, ih); ctx.restore();

    ctx.save(); ctx.globalAlpha = 0.55;
    ctx.filter = `blur(2px) ${gold}`;
    ctx.drawImage(img, ix, iy, iw, ih); ctx.restore();

    // Sharp core line
    ctx.save(); ctx.globalAlpha = 0.92;
    ctx.filter = gold;
    ctx.drawImage(img, ix, iy, iw, ih); ctx.restore();

    // Award stars + labels – positioned along face outline path
    AWARDS.forEach(a => {
      const [fx, fy] = pathPoint(a.t);
      const x = ix + fx * iw;
      const y = iy + fy * ih;
      drawStar(x, y, a.size, time, a.phase);
      drawLabel(x, y, a.label, a.sub, a.size, time, a.phase, a.side);
    });

    requestAnimationFrame(draw);
  }

  // ── Resize ────────────────────────────────────────────────────────────────
  function resize() {
    dpr = window.devicePixelRatio || 1;
    W   = window.innerWidth;
    H   = window.innerHeight;
    canvas.width  = W * dpr;
    canvas.height = H * dpr;
    canvas.style.width  = W + 'px';
    canvas.style.height = H + 'px';
    ctx.scale(dpr, dpr);
  }

  resize();
  window.addEventListener('resize', () => { ctx.setTransform(1,0,0,1,0,0); resize(); });
  img.onload = () => document.fonts.ready.then(() => requestAnimationFrame(draw));
  if (img.complete && img.naturalWidth) document.fonts.ready.then(() => requestAnimationFrame(draw));
  </script>
</body>
</html>
