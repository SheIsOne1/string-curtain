<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Bella — Awards</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Imperial+Script&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
    header {
      position: fixed; top: 0; left: 0; right: 0; height: 60px;
      display: flex; align-items: center; padding: 0 28px; z-index: 10;
    }
    .back-link {
      color: rgba(210,168,65,0.75); font-family: 'Imperial Script', cursive;
      font-size: 18px; text-decoration: none; transition: color 0.2s;
    }
    .back-link:hover { color: #7aaeff; }
    .page-title {
      font-family: 'Imperial Script', cursive; font-size: 32px;
      font-weight: 400; color: rgba(210,168,65,0.85); margin-left: 24px;
    }
    canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <header>
    <a href="https://sheisone1.github.io/string-curtain/index.html?open=1" class="back-link">← Back</a>
    <h1 class="page-title">Awards</h1>
  </header>

  <script>
  const canvas = document.getElementById('c');
  const ctx    = canvas.getContext('2d');
  let W, H, dpr;

  const HEADER = 60;

  const PASSES = [[14, 0.022], [7, 0.055], [3, 0.16], [1, 0.75]];

  // Woman's face constellation
  //  0=crown  1=temple-L  2=temple-R
  //  3=eye-L  4=eye-R  5=nose
  //  6=cheek-L  7=cheek-R
  //  8=lip-L  9=lip-R  10=chin
  const RAW_NODES = [
    { rx:0.50, ry:0.12, label:"Palme d'Or",          sub:"Cannes 2025",         size:2.2, phase:0.0 }, // 0 crown
    { rx:0.26, ry:0.24, label:"Grand Prix",           sub:"Tribeca 2025",        size:1.6, phase:1.1 }, // 1 temple-L
    { rx:0.74, ry:0.24, label:"Best Cinematography",  sub:"Sundance 2025",       size:1.6, phase:2.2 }, // 2 temple-R
    { rx:0.34, ry:0.37, label:"Best Feature",         sub:"Berlin 2025",         size:1.7, phase:0.7 }, // 3 eye-L
    { rx:0.66, ry:0.37, label:"Best Director",        sub:"TIFF 2025",           size:1.7, phase:1.8 }, // 4 eye-R
    { rx:0.50, ry:0.52, label:"Jury Prize",           sub:"Venice 2025",         size:1.3, phase:3.1 }, // 5 nose
    { rx:0.20, ry:0.56, label:"Best Score",           sub:"Edinburgh 2025",      size:1.1, phase:2.5 }, // 6 cheek-L
    { rx:0.80, ry:0.56, label:"Audience Award",       sub:"Rotterdam 2025",      size:1.1, phase:0.4 }, // 7 cheek-R
    { rx:0.38, ry:0.68, label:"Best Editing",         sub:"Locarno 2025",        size:1.2, phase:1.5 }, // 8 lip-L
    { rx:0.62, ry:0.68, label:"Discovery Prize",      sub:"Toronto 2025",        size:1.2, phase:2.8 }, // 9 lip-R
    { rx:0.50, ry:0.80, label:"Special Mention",      sub:"SXSW 2025",           size:1.1, phase:0.9 }, // 10 chin
  ];

  function buildNodes() {
    const ah = H - HEADER;
    return RAW_NODES.map(n => ({
      ...n,
      x: n.rx * W,
      y: HEADER + n.ry * ah,
    }));
  }

  const CONNECTIONS = [
    // Forehead arc: temple-L → crown → temple-R
    [1,0],[0,2],
    // Temple to eye (brow lines)
    [1,3],[2,4],
    // Eye bridge
    [3,4],
    // Eyes to nose
    [3,5],[4,5],
    // Nose to cheeks (nostril lines)
    [5,6],[5,7],
    // Face outline: temple → cheek → jaw → chin
    [1,6],[6,10],
    [2,7],[7,10],
    // Chin to lips
    [10,8],[10,9],
    // Mouth
    [8,9],
    // Smile lines: eye to lip corner
    [3,8],[4,9],
  ];

  function buildConnections() { return CONNECTIONS; }

  // ── Thread line between two points ───────────────────────────────────────
  function drawThread(x1, y1, x2, y2, time, phase) {
    const dx = x2 - x1, dy = y2 - y1;
    const len = Math.sqrt(dx * dx + dy * dy);
    if (len < 1) return;
    const ux = dx / len, uy = dy / len;
    const px = -uy, py = ux;
    const steps = Math.max(40, Math.round(len / 4));

    for (const [lw, alpha] of PASSES) {
      ctx.beginPath();
      ctx.strokeStyle = `rgba(210,168,65,${alpha})`;
      ctx.lineWidth   = lw;
      ctx.lineCap     = 'round';
      for (let s = 0; s <= steps; s++) {
        const tp   = s / steps;
        const bx   = x1 + dx * tp;
        const by   = y1 + dy * tp;
        const wave = Math.sin(tp * Math.PI * 4 + time * 0.0007 + phase) * 2.5;
        s === 0
          ? ctx.moveTo(bx + px * wave, by + py * wave)
          : ctx.lineTo(bx + px * wave, by + py * wave);
      }
      ctx.stroke();
    }
  }

  // ── Glowing star node ─────────────────────────────────────────────────────
  function drawStar(x, y, size, time, phase) {
    const pulse = 0.72 + 0.28 * Math.sin(time * 0.0017 + phase);
    const glowR = size * 20 * pulse;
    const coreR = size * 3.2;

    // Radial glow
    const g = ctx.createRadialGradient(x, y, 0, x, y, glowR);
    g.addColorStop(0,    `rgba(255,242,200,${0.6 * pulse})`);
    g.addColorStop(0.2,  `rgba(210,168,65,${0.35 * pulse})`);
    g.addColorStop(0.6,  `rgba(210,168,65,${0.07 * pulse})`);
    g.addColorStop(1,     'rgba(0,0,0,0)');
    ctx.beginPath();
    ctx.arc(x, y, glowR, 0, Math.PI * 2);
    ctx.fillStyle = g;
    ctx.fill();

    // 4-point sparkle
    const sLen = size * 13 * pulse;
    for (let i = 0; i < 4; i++) {
      const ang = i * Math.PI / 2 + time * 0.00012;
      const sg  = ctx.createLinearGradient(x, y,
                    x + Math.cos(ang) * sLen, y + Math.sin(ang) * sLen);
      sg.addColorStop(0, `rgba(255,248,220,${0.65 * pulse})`);
      sg.addColorStop(1,  'rgba(210,168,65,0)');
      ctx.beginPath();
      ctx.moveTo(x, y);
      ctx.lineTo(x + Math.cos(ang) * sLen, y + Math.sin(ang) * sLen);
      ctx.strokeStyle = sg;
      ctx.lineWidth   = 0.9;
      ctx.stroke();
    }

    // Core dot
    const cg = ctx.createRadialGradient(x, y, 0, x, y, coreR);
    cg.addColorStop(0, `rgba(255,255,245,${0.95 * pulse})`);
    cg.addColorStop(1,  'rgba(210,168,65,0.3)');
    ctx.beginPath();
    ctx.arc(x, y, coreR, 0, Math.PI * 2);
    ctx.fillStyle = cg;
    ctx.fill();
  }

  // ── Award label ───────────────────────────────────────────────────────────
  function drawLabel(node, time) {
    const { x, y, label, sub, size, phase } = node;
    const pulse = 0.72 + 0.28 * Math.sin(time * 0.0017 + phase);
    const alpha = 0.65 + 0.35 * pulse;

    // Place label directly above or below the star
    const offsetY = y > H * 0.55 ? size * 26 : -(size * 26);
    const lx = x;
    const ly = y + offsetY;

    const fSize = Math.round(9 + size * 3.5);
    ctx.font      = `${fSize}px 'Imperial Script', cursive`;
    ctx.fillStyle = `rgba(210,168,65,${alpha})`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, lx, ly);

    ctx.font      = `${Math.round(fSize * 0.70)}px 'Imperial Script', cursive`;
    ctx.fillStyle = `rgba(122,174,255,${alpha * 0.82})`;
    ctx.fillText(sub, lx, ly + fSize * 1.1);
  }

  // ── Main loop ─────────────────────────────────────────────────────────────
  function draw(time) {
    ctx.clearRect(0, 0, W, H);

    const nodes = buildNodes();
    const conns = buildConnections();
    const cx    = W / 2;
    const cy    = HEADER + (H - HEADER) / 2;

    // Threads first
    conns.forEach(([i, j]) => {
      const a = nodes[i], b = nodes[j];
      drawThread(a.x, a.y, b.x, b.y, time, (a.phase + b.phase) * 0.5);
    });

    // Stars + labels on top
    nodes.forEach(n => {
      drawStar(n.x, n.y, n.size, time, n.phase);
      drawLabel(n, time);
    });

    requestAnimationFrame(draw);
  }

  function resize() {
    dpr = window.devicePixelRatio || 1;
    W   = window.innerWidth;
    H   = window.innerHeight;
    canvas.width  = W * dpr;
    canvas.height = H * dpr;
    canvas.style.width  = W + 'px';
    canvas.style.height = H + 'px';
    ctx.scale(dpr, dpr);
  }

  resize();
  window.addEventListener('resize', () => { ctx.setTransform(1,0,0,1,0,0); resize(); });
  document.fonts.ready.then(() => requestAnimationFrame(draw));
  </script>
</body>
</html>
