<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Bella — Awards</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
    header {
      position: fixed; top: 0; left: 0; right: 0; height: 60px;
      display: flex; align-items: center; padding: 0 28px; z-index: 10;
    }
    .back-link {
      color: rgba(210,168,65,0.75); font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 18px; text-decoration: none; transition: color 0.2s;
    }
    .back-link:hover { color: #7aaeff; }
    .page-title {
      font-family: 'Playfair Display', serif;
      font-style: italic; font-size: 32px;
      font-weight: 400; color: rgba(210,168,65,0.85); margin-left: 24px;
    }
    canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; cursor: default; }

    /* Modal */
    #modal {
      display: none; position: fixed; inset: 0; z-index: 100;
      align-items: center; justify-content: center;
      background: rgba(0,0,0,0.65); backdrop-filter: blur(6px);
    }
    #modal.open { display: flex; }
    #modal-box {
      position: relative;
      border: 1px solid rgba(210,168,65,0.35);
      background: rgba(0,0,0,0.88);
      padding: 44px 60px 36px;
      text-align: center;
      max-width: 400px;
      box-shadow: 0 0 80px rgba(255,248,180,0.08), 0 0 30px rgba(210,168,65,0.12);
    }
    #modal-festival {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 13px; letter-spacing: 0.14em;
      color: rgba(122,174,255,0.75);
      margin-bottom: 14px;
    }
    #modal-prize {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 42px; line-height: 1.1;
      color: rgba(255,252,200,0.95);
      margin-bottom: 10px;
    }
    #modal-year {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 17px;
      color: rgba(210,168,65,0.6);
    }
    #modal-close {
      position: absolute; top: 14px; right: 18px;
      background: none; border: none; cursor: pointer;
      color: rgba(210,168,65,0.45); font-size: 24px;
      font-family: sans-serif; line-height: 1; transition: color 0.2s;
    }
    #modal-close:hover { color: rgba(255,248,180,0.9); }

    /* ===== MOBILE ===== */
    @media (max-width: 767px) {
      header { height: 50px; padding: 0 16px; }
      .page-title { font-size: 22px; margin-left: 10px; }
      #modal-box {
        padding: 36px 24px 28px;
        margin: 0 16px;
        max-width: calc(100% - 32px);
      }
      #modal-prize   { font-size: 28px; }
      #modal-festival{ font-size: 11px; }
    }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <header>
    <a href="https://sheisone1.github.io/string-curtain/index.html?open=1" class="back-link">← Back</a>
    <h1 class="page-title">Awards</h1>
  </header>

  <div id="modal">
    <div id="modal-box">
      <button id="modal-close" onclick="closeModal()">×</button>
      <div id="modal-festival"></div>
      <div id="modal-prize"></div>
      <div id="modal-year"></div>
    </div>
  </div>

  <script>
  const canvas = document.getElementById('c');
  const ctx    = canvas.getContext('2d');
  let W, H, dpr;
  const HEADER = 60;
  const ZOOM   = 1.10;   // slight zoom in

  const img = new Image();
  img.src = 'face.png';

  // ── Face outline path – [fx, fy] normalized within image rect ─────────────
  // Traces the main contour: hair curl → forehead → eye → nose → lips → chin → neck → shoulder
  const FACE_PATH = [
    [0.41, 0.00],  // hair peak
    [0.38, 0.05],  // hair curl base
    [0.43, 0.11],  // forehead top
    [0.45, 0.20],  // upper forehead
    [0.44, 0.29],  // brow
    [0.46, 0.35],  // eye
    [0.49, 0.40],  // nose bridge
    [0.55, 0.45],  // nose tip
    [0.53, 0.50],  // upper lip
    [0.50, 0.54],  // mouth
    [0.47, 0.59],  // lower lip
    [0.45, 0.63],  // chin
    [0.41, 0.68],  // jaw
    [0.42, 0.75],  // upper neck
    [0.43, 0.83],  // lower neck
    [0.38, 0.90],  // collarbone
    [0.33, 0.97],  // shoulder
  ];

  // Catmull-Rom spline: t ∈ [0,1] → [fx, fy]
  function pathPoint(t) {
    const n = FACE_PATH.length - 1;
    const seg = Math.min(Math.floor(t * n), n - 1);
    const lt  = t * n - seg;
    const p0  = FACE_PATH[Math.max(0,  seg - 1)];
    const p1  = FACE_PATH[seg];
    const p2  = FACE_PATH[Math.min(n,  seg + 1)];
    const p3  = FACE_PATH[Math.min(n,  seg + 2)];
    const cr  = (a, b, c, d, s) => 0.5 * (
      2*b + (-a+c)*s + (2*a-5*b+4*c-d)*s*s + (-a+3*b-3*c+d)*s*s*s
    );
    return [ cr(p0[0],p1[0],p2[0],p3[0],lt), cr(p0[1],p1[1],p2[1],p3[1],lt) ];
  }

  // ── 6 awards along the face outline – real prize names ───────────────────
  const AWARDS = [
    { t:0.05, side:'right', prize:"Palme d'Or",      festival:"Cannes Film Festival",           year:"2025", size:2.0, phase:0.0 },
    { t:0.22, side:'left',  prize:"Golden Bear",      festival:"Berlin Int'l Film Festival",     year:"2025", size:1.7, phase:1.4 },
    { t:0.36, side:'right', prize:"Golden Lion",      festival:"Venice Film Festival",           year:"2024", size:1.8, phase:2.1 },
    { t:0.52, side:'left',  prize:"Grand Jury Prize", festival:"Sundance Film Festival",         year:"2025", size:1.5, phase:0.8 },
    { t:0.66, side:'right', prize:"Silver Bear",      festival:"Berlin Film Festival",           year:"2024", size:1.5, phase:2.8 },
    { t:0.84, side:'left',  prize:"BAFTA Award",      festival:"British Academy of Film & TV",   year:"2025", size:1.4, phase:1.6 },
  ];

  // ── Face image rect (with zoom) ───────────────────────────────────────────
  function faceRect() {
    const ih  = (H - HEADER) * 0.88 * ZOOM;
    const aspect = img.naturalHeight > 0 ? img.naturalWidth / img.naturalHeight : 0.74;
    const iw  = ih * aspect;
    const ix  = (W - iw) / 2;
    // center vertically within the available space, accounting for zoom
    const iy  = HEADER + (H - HEADER) * 0.06 - (ih - (H - HEADER) * 0.88) / 2;
    return { ix, iy, iw, ih };
  }

  // ── Glowing particle cluster ──────────────────────────────────────────────
  function drawParticle(x, y, size, time, phase) {
    const pulse = 0.70 + 0.30 * Math.sin(time * 0.002 + phase);

    // Soft outer glow (small, warm)
    const gR = size * 10 * pulse;
    const g  = ctx.createRadialGradient(x, y, 0, x, y, gR);
    g.addColorStop(0,   `rgba(255,252,210,${0.38 * pulse})`);
    g.addColorStop(0.4, `rgba(255,240,160,${0.10 * pulse})`);
    g.addColorStop(1,   'rgba(255,220,80,0)');
    ctx.beginPath(); ctx.arc(x, y, gR, 0, Math.PI * 2);
    ctx.fillStyle = g; ctx.fill();

    // Orbiting micro-particles
    const count = 6;
    for (let i = 0; i < count; i++) {
      const speed = i % 2 === 0 ? 0.00085 : -0.00055;
      const ang   = (i / count) * Math.PI * 2 + time * speed + phase;
      const r     = size * (2.8 + Math.sin(time * 0.0025 + i * 1.1) * 1.0);
      const px    = x + Math.cos(ang) * r;
      const py    = y + Math.sin(ang) * r;
      const ps    = Math.max(0.3, (0.7 + Math.sin(time * 0.003 + i * 1.7) * 0.35) * pulse);
      ctx.beginPath(); ctx.arc(px, py, ps, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,252,200,${0.70 * pulse})`;
      ctx.fill();
    }

    // Bright core
    const cg = ctx.createRadialGradient(x, y, 0, x, y, size * 1.8);
    cg.addColorStop(0,   `rgba(255,255,245,${pulse})`);
    cg.addColorStop(0.5, `rgba(255,250,190,${0.50 * pulse})`);
    cg.addColorStop(1,   'rgba(255,230,100,0)');
    ctx.beginPath(); ctx.arc(x, y, size * 1.8, 0, Math.PI * 2);
    ctx.fillStyle = cg; ctx.fill();
  }

  // ── Award label – drawn just beyond the particle ──────────────────────────
  function drawLabel(px, py, prize, festival, size, time, phase, side) {
    const isMobile = W < 768;
    const pulse  = 0.72 + 0.28 * Math.sin(time * 0.0017 + phase);
    const alpha  = 0.65 + 0.35 * pulse;
    const fSize  = Math.round((isMobile ? 7 : 9) + size * (isMobile ? 2 : 3));
    const isLeft = side === 'left';
    const offX   = isLeft
      ? -(size * (isMobile ? 3 : 5) + (isMobile ? 7 : 12))
      :  (size * (isMobile ? 3 : 5) + (isMobile ? 7 : 12));

    ctx.textAlign    = isLeft ? 'right' : 'left';
    ctx.textBaseline = 'middle';
    ctx.font      = `italic ${fSize}px 'Playfair Display', serif`;
    ctx.fillStyle = `rgba(255,250,185,${alpha})`;
    ctx.fillText(prize, px + offX, py);
    if (!isMobile) {
      ctx.font      = `italic ${Math.round(fSize * 0.68)}px 'Playfair Display', serif`;
      ctx.fillStyle = `rgba(122,174,255,${alpha * 0.78})`;
      ctx.fillText(festival, px + offX, py + fSize * 1.1);
    }
  }

  // ── Modal ─────────────────────────────────────────────────────────────────
  function showModal(a) {
    document.getElementById('modal-festival').textContent = a.festival;
    document.getElementById('modal-prize').textContent    = a.prize;
    document.getElementById('modal-year').textContent     = a.year;
    document.getElementById('modal').classList.add('open');
  }
  function closeModal() {
    document.getElementById('modal').classList.remove('open');
  }
  document.getElementById('modal').addEventListener('click', e => {
    if (e.target === document.getElementById('modal')) closeModal();
  });

  // ── Hit detection ─────────────────────────────────────────────────────────
  let awardPositions = [];

  canvas.addEventListener('click', e => {
    if (document.getElementById('modal').classList.contains('open')) return;
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    for (const ap of awardPositions) {
      const dx = mx - ap.x, dy = my - ap.y;
      if (dx*dx + dy*dy < 34*34) { showModal(ap.award); break; }
    }
  });

  // ── Mouse trail ───────────────────────────────────────────────────────────
  let mouseTrail = [];
  const TRAIL_MS = 280;

  canvas.addEventListener('mousemove', e => {
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    mouseTrail.push({ x: mx, y: my, t: performance.now() });
    if (mouseTrail.length > 40) mouseTrail.shift();

    let hit = false;
    for (const ap of awardPositions) {
      const dx = mx - ap.x, dy = my - ap.y;
      if (dx*dx + dy*dy < 34*34) { hit = true; break; }
    }
    canvas.style.cursor = hit ? 'pointer' : 'default';
  });

  function drawMouseTrail() {
    const now = performance.now();
    mouseTrail = mouseTrail.filter(p => now - p.t < TRAIL_MS);
    if (mouseTrail.length < 3) return;

    const tip = mouseTrail[mouseTrail.length - 1];
    const old = mouseTrail[0];

    // Build smooth catmull-rom path through all points
    function buildPath() {
      ctx.beginPath();
      ctx.moveTo(mouseTrail[0].x, mouseTrail[0].y);
      for (let i = 0; i < mouseTrail.length - 1; i++) {
        const p0 = mouseTrail[Math.max(0, i - 1)];
        const p1 = mouseTrail[i];
        const p2 = mouseTrail[i + 1];
        const p3 = mouseTrail[Math.min(mouseTrail.length - 1, i + 2)];
        const cp1x = p1.x + (p2.x - p0.x) / 6;
        const cp1y = p1.y + (p2.y - p0.y) / 6;
        const cp2x = p2.x - (p3.x - p1.x) / 6;
        const cp2y = p2.y - (p3.y - p1.y) / 6;
        ctx.bezierCurveTo(cp1x, cp1y, cp2x, cp2y, p2.x, p2.y);
      }
    }

    const grad = ctx.createLinearGradient(old.x, old.y, tip.x, tip.y);
    grad.addColorStop(0, 'rgba(255,250,185,0)');
    grad.addColorStop(1, 'rgba(255,250,185,0.75)');

    ctx.save();
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';

    // Soft glow pass
    buildPath();
    ctx.strokeStyle = grad;
    ctx.lineWidth = 3.5;
    ctx.globalAlpha = 0.12;
    ctx.stroke();

    // Mid glow
    buildPath();
    ctx.strokeStyle = grad;
    ctx.lineWidth = 1.8;
    ctx.globalAlpha = 0.25;
    ctx.stroke();

    // Crisp thread core
    buildPath();
    ctx.strokeStyle = grad;
    ctx.lineWidth = 0.7;
    ctx.globalAlpha = 0.85;
    ctx.stroke();

    // Tiny bright dot at tip
    ctx.globalAlpha = 1;
    const g = ctx.createRadialGradient(tip.x, tip.y, 0, tip.x, tip.y, 5);
    g.addColorStop(0, 'rgba(255,255,220,0.8)');
    g.addColorStop(1, 'rgba(255,250,185,0)');
    ctx.beginPath(); ctx.arc(tip.x, tip.y, 5, 0, Math.PI * 2);
    ctx.fillStyle = g; ctx.fill();

    ctx.restore();
  }

  // ── Main draw loop ────────────────────────────────────────────────────────
  function draw(time) {
    if (!img.complete || !img.naturalWidth) { requestAnimationFrame(draw); return; }
    ctx.clearRect(0, 0, W, H);

    const { ix, iy, iw, ih } = faceRect();
    const pulse = 0.88 + 0.12 * Math.sin(time * 0.0007);
    // Matches title color rgba(255,250,185): pale warm cream-yellow, glowing
    const gold  = 'invert(1) sepia(1) saturate(3) hue-rotate(8deg) brightness(1.4)';

    // Wide outer glow (strongest pulse)
    ctx.save(); ctx.globalAlpha = 0.14 * pulse;
    ctx.filter = `blur(30px) ${gold}`;
    ctx.drawImage(img, ix, iy, iw, ih); ctx.restore();

    ctx.save(); ctx.globalAlpha = 0.22 * pulse;
    ctx.filter = `blur(16px) ${gold}`;
    ctx.drawImage(img, ix, iy, iw, ih); ctx.restore();

    ctx.save(); ctx.globalAlpha = 0.40 * pulse;
    ctx.filter = `blur(7px) ${gold}`;
    ctx.drawImage(img, ix, iy, iw, ih); ctx.restore();

    ctx.save(); ctx.globalAlpha = 0.60;
    ctx.filter = `blur(2px) ${gold}`;
    ctx.drawImage(img, ix, iy, iw, ih); ctx.restore();

    // Sharp core line
    ctx.save(); ctx.globalAlpha = 0.95;
    ctx.filter = gold;
    ctx.drawImage(img, ix, iy, iw, ih); ctx.restore();

    // Particles + labels: anchor on face outline, particle at title position
    awardPositions = [];
    AWARDS.forEach(a => {
      const [fx, fy] = pathPoint(a.t);
      const ax = ix + fx * iw;           // anchor on face outline
      const ay = iy + fy * ih;
      const isLeft = a.side === 'left';
      const dist   = a.size * 42 + 16;  // how far the particle sits from the face
      const px = ax + (isLeft ? -dist : dist);  // particle / title position
      const py = ay;
      const pulse = 0.70 + 0.30 * Math.sin(time * 0.002 + a.phase);

      awardPositions.push({ x: px, y: py, award: a });
      drawParticle(px, py, a.size, time, a.phase);
      drawLabel(px, py, a.prize, a.festival, a.size, time, a.phase, a.side);
    });

    drawMouseTrail();
    requestAnimationFrame(draw);
  }

  // ── Resize ────────────────────────────────────────────────────────────────
  function resize() {
    dpr = window.devicePixelRatio || 1;
    W   = window.innerWidth;
    H   = window.innerHeight;
    canvas.width  = W * dpr;
    canvas.height = H * dpr;
    canvas.style.width  = W + 'px';
    canvas.style.height = H + 'px';
    ctx.scale(dpr, dpr);
  }

  resize();
  window.addEventListener('resize', () => { ctx.setTransform(1,0,0,1,0,0); resize(); });
  img.onload = () => document.fonts.ready.then(() => requestAnimationFrame(draw));
  if (img.complete && img.naturalWidth) document.fonts.ready.then(() => requestAnimationFrame(draw));
  </script>
</body>
</html>
