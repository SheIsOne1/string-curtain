<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Bella — Awards</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Imperial+Script&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
    header {
      position: fixed; top: 0; left: 0; right: 0; height: 60px;
      display: flex; align-items: center; padding: 0 28px; z-index: 10;
    }
    .back-link {
      color: rgba(210,168,65,0.75); font-family: 'Imperial Script', cursive;
      font-size: 18px; text-decoration: none; transition: color 0.2s;
    }
    .back-link:hover { color: #7aaeff; }
    .page-title {
      font-family: 'Imperial Script', cursive; font-size: 32px;
      font-weight: 400; color: rgba(210,168,65,0.85); margin-left: 24px;
    }
    canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <header>
    <a href="https://sheisone1.github.io/string-curtain/index.html?open=1" class="back-link">← Back</a>
    <h1 class="page-title">Awards</h1>
  </header>

  <script>
  const canvas = document.getElementById('c');
  const ctx    = canvas.getContext('2d');
  let W, H, dpr;
  const HEADER = 60;
  const PASSES = [[16, 0.018], [8, 0.048], [3.5, 0.14], [1, 0.75]];

  // ── Catmull-Rom spline draw ───────────────────────────────────────────────
  function drawSpline(pts) {
    if (pts.length < 2) return;
    ctx.moveTo(pts[0][0], pts[0][1]);
    for (let i = 0; i < pts.length - 1; i++) {
      const p0 = pts[Math.max(i - 1, 0)];
      const p1 = pts[i];
      const p2 = pts[i + 1];
      const p3 = pts[Math.min(i + 2, pts.length - 1)];
      const cp1x = p1[0] + (p2[0] - p0[0]) / 6;
      const cp1y = p1[1] + (p2[1] - p0[1]) / 6;
      const cp2x = p2[0] - (p3[0] - p1[0]) / 6;
      const cp2y = p2[1] - (p3[1] - p1[1]) / 6;
      ctx.bezierCurveTo(cp1x, cp1y, cp2x, cp2y, p2[0], p2[1]);
    }
  }

  function glowLine(pts, alphaMult) {
    for (const [lw, alpha] of PASSES) {
      ctx.beginPath();
      drawSpline(pts);
      ctx.strokeStyle = `rgba(210,168,65,${alpha * alphaMult})`;
      ctx.lineWidth   = lw;
      ctx.lineCap     = 'round';
      ctx.lineJoin    = 'round';
      ctx.stroke();
    }
  }

  // ── Face geometry (side profile, facing left) ─────────────────────────────
  function makeGeo() {
    const fh = (H - HEADER) * 0.86;
    const fw = fh * 0.72;
    // Center horizontally: nose (leftmost ~0.14fw) to back-of-head (~0.88fw)
    const fx = W * 0.50 - fw * 0.50;
    const fy = HEADER + (H - HEADER) * 0.06;
    const p  = (rx, ry) => [fx + rx * fw, fy + ry * fh];
    return p;
  }

  // ── Award star positions [rx, ry, label, sub, size, phase] ───────────────
  const AWARDS = [
    [0.60, 0.00, "Palme d'Or",          "Cannes 2025",         2.2, 0.0], // crown
    [0.38, 0.24, "Best Director",       "TIFF 2025",           1.7, 1.1], // eye
    [0.14, 0.38, "Grand Prix",          "Tribeca 2025",        1.6, 2.2], // nose tip
    [0.17, 0.62, "Jury Prize",          "Venice 2025",         1.4, 0.7], // lower lip
    [0.20, 0.68, "Best Cinematography", "Sundance 2025",       1.5, 1.8], // chin
    [0.88, 0.35, "Best Feature",        "Berlin 2025",         1.5, 3.1], // hair back
    [0.50, 0.26, "Best Score",          "Edinburgh 2025",      1.2, 2.5], // outer eye
    [0.62, 0.97, "Audience Award",      "Rotterdam 2025",      1.1, 0.4], // neck base
  ];

  // ── Draw glowing star ─────────────────────────────────────────────────────
  function drawStar(x, y, size, time, phase) {
    const pulse = 0.72 + 0.28 * Math.sin(time * 0.0017 + phase);
    const gR = size * 18 * pulse;

    const g = ctx.createRadialGradient(x, y, 0, x, y, gR);
    g.addColorStop(0,    `rgba(255,242,200,${0.65 * pulse})`);
    g.addColorStop(0.25, `rgba(210,168,65,${0.28 * pulse})`);
    g.addColorStop(0.7,  `rgba(210,168,65,${0.05 * pulse})`);
    g.addColorStop(1,    'rgba(0,0,0,0)');
    ctx.beginPath(); ctx.arc(x, y, gR, 0, Math.PI * 2);
    ctx.fillStyle = g; ctx.fill();

    const sLen = size * 10 * pulse;
    for (let i = 0; i < 4; i++) {
      const ang = i * Math.PI / 2 + time * 0.00012;
      const sg  = ctx.createLinearGradient(x, y,
        x + Math.cos(ang) * sLen, y + Math.sin(ang) * sLen);
      sg.addColorStop(0, `rgba(255,248,220,${0.6 * pulse})`);
      sg.addColorStop(1, 'rgba(210,168,65,0)');
      ctx.beginPath();
      ctx.moveTo(x, y);
      ctx.lineTo(x + Math.cos(ang) * sLen, y + Math.sin(ang) * sLen);
      ctx.strokeStyle = sg; ctx.lineWidth = 0.8; ctx.stroke();
    }

    const cg = ctx.createRadialGradient(x, y, 0, x, y, size * 2.8);
    cg.addColorStop(0, `rgba(255,255,245,${0.95 * pulse})`);
    cg.addColorStop(1, 'rgba(210,168,65,0.3)');
    ctx.beginPath(); ctx.arc(x, y, size * 2.8, 0, Math.PI * 2);
    ctx.fillStyle = cg; ctx.fill();
  }

  // ── Award label ───────────────────────────────────────────────────────────
  function drawLabel(x, y, label, sub, size, time, phase, rx) {
    const pulse  = 0.72 + 0.28 * Math.sin(time * 0.0017 + phase);
    const alpha  = 0.65 + 0.35 * pulse;
    const fSize  = Math.round(9 + size * 3);
    const isLeft = rx < 0.50;
    const offX   = isLeft ? -(size * 28 + 18) : (size * 28 + 18);

    ctx.textAlign    = isLeft ? 'right' : 'left';
    ctx.textBaseline = 'middle';

    ctx.font      = `${fSize}px 'Imperial Script', cursive`;
    ctx.fillStyle = `rgba(210,168,65,${alpha})`;
    ctx.fillText(label, x + offX, y);

    ctx.font      = `${Math.round(fSize * 0.70)}px 'Imperial Script', cursive`;
    ctx.fillStyle = `rgba(122,174,255,${alpha * 0.82})`;
    ctx.fillText(sub, x + offX, y + fSize * 1.1);
  }

  // ── Main draw ─────────────────────────────────────────────────────────────
  function draw(time) {
    ctx.clearRect(0, 0, W, H);
    const p     = makeGeo();
    const pulse = 0.88 + 0.12 * Math.sin(time * 0.0007);

    // ── Main face outline (one continuous profile) ───────────────────────
    // Profile faces LEFT. Nose tip is leftmost (~rx 0.14).
    // Hair bump at back (~rx 0.88) gives head volume.
    glowLine([
      p(0.60, 0.00), // crown
      p(0.47, 0.01), // forehead center
      p(0.34, 0.08), // forehead slope
      p(0.25, 0.18), // nose bridge top
      p(0.18, 0.28), // nose bridge lower
      p(0.14, 0.38), // nose tip (most left)
      p(0.16, 0.44), // under-nose curve
      p(0.24, 0.48), // nostril base
      p(0.21, 0.52), // philtrum
      p(0.19, 0.56), // upper lip peak
      p(0.17, 0.62), // lower lip
      p(0.20, 0.68), // chin tip
      p(0.28, 0.74), // lower jaw
      p(0.38, 0.79), // jaw angle
      p(0.45, 0.84), // neck front top
      p(0.48, 0.91), // neck front base
      p(0.54, 0.96), // neck bottom front
      p(0.62, 0.97), // neck bottom
      p(0.70, 0.95), // neck bottom back
      p(0.74, 0.88), // neck back
      p(0.78, 0.74), // back of head lower
      p(0.84, 0.56), // back of head mid
      p(0.88, 0.35), // back of head — hair volume bulge
      p(0.86, 0.16), // hair upper back
      p(0.78, 0.05), // hair top
      p(0.68, 0.01), // hair front top
      p(0.60, 0.00), // close to crown
    ], pulse);

    // ── Eyebrow ──────────────────────────────────────────────────────────
    glowLine([
      p(0.30, 0.21),
      p(0.38, 0.17),
      p(0.48, 0.18),
      p(0.53, 0.20),
    ], pulse * 0.60);

    // ── Closed eye (upper + lower lid as one loop) ───────────────────────
    glowLine([
      p(0.31, 0.28), // inner corner
      p(0.38, 0.24), // upper lid peak
      p(0.50, 0.26), // outer corner
      p(0.44, 0.32), // lower lid curve
      p(0.31, 0.28), // close inner corner
    ], pulse * 0.82);

    // ── Eye inner oval (iris hint) ────────────────────────────────────────
    glowLine([
      p(0.38, 0.26),
      p(0.42, 0.24),
      p(0.46, 0.26),
      p(0.42, 0.29),
      p(0.38, 0.26),
    ], pulse * 0.45);

    // ── Nostril small curve ───────────────────────────────────────────────
    glowLine([
      p(0.24, 0.48),
      p(0.19, 0.50),
      p(0.22, 0.53),
    ], pulse * 0.68);

    // ── Upper lip (cupid's bow S-curve) ──────────────────────────────────
    glowLine([
      p(0.24, 0.48), // under nose
      p(0.22, 0.52), // right bow peak
      p(0.20, 0.50), // cupid dip
      p(0.18, 0.55), // left bow peak
      p(0.17, 0.58), // mouth line
    ], pulse * 0.78);

    // ── Lower lip (fuller curve) ──────────────────────────────────────────
    glowLine([
      p(0.17, 0.58),
      p(0.18, 0.63),
      p(0.20, 0.66),
      p(0.17, 0.62),
    ], pulse * 0.78);

    // ── Neck collar flourish (decorative loop) ────────────────────────────
    glowLine([
      p(0.60, 0.97),
      p(0.55, 0.94),
      p(0.52, 0.98),
      p(0.56, 1.01),
      p(0.64, 1.00),
      p(0.68, 0.96),
      p(0.62, 0.94),
    ], pulse * 0.50);

    // ── Award stars + labels ──────────────────────────────────────────────
    AWARDS.forEach(([rx, ry, label, sub, size, phase]) => {
      const [x, y] = p(rx, ry);
      drawStar(x, y, size, time, phase);
      drawLabel(x, y, label, sub, size, time, phase, rx);
    });

    requestAnimationFrame(draw);
  }

  function resize() {
    dpr = window.devicePixelRatio || 1;
    W   = window.innerWidth;
    H   = window.innerHeight;
    canvas.width  = W * dpr;
    canvas.height = H * dpr;
    canvas.style.width  = W + 'px';
    canvas.style.height = H + 'px';
    ctx.scale(dpr, dpr);
  }

  resize();
  window.addEventListener('resize', () => { ctx.setTransform(1,0,0,1,0,0); resize(); });
  document.fonts.ready.then(() => requestAnimationFrame(draw));
  </script>
</body>
</html>
