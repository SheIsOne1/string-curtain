<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Bella — Creators</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Imperial+Script&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }

    canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    .page-header {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 60px;
      display: flex;
      align-items: center;
      padding: 0 32px;
      gap: 24px;
      z-index: 10;
    }

    .back-link {
      font-family: 'Imperial Script', cursive;
      font-size: 18px;
      color: rgba(210,168,65,0.65);
      text-decoration: none;
      transition: color 0.2s;
    }
    .back-link:hover { color: rgba(210,168,65,1); }

    .page-title {
      font-family: 'Imperial Script', cursive;
      font-size: 38px;
      color: rgba(210,168,65,0.9);
      font-weight: 400;
    }

    .creator-labels {
      position: fixed;
      left: 0; right: 0;
      height: 90px;
      display: flex;
      z-index: 10;
      pointer-events: none;
    }

    .creator-label {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }

    .creator-label .name {
      font-family: 'Imperial Script', cursive;
      font-size: 30px;
      color: rgba(210,168,65,0.92);
    }

    .creator-label .role {
      font-family: 'Imperial Script', cursive;
      font-size: 15px;
      color: rgba(210,168,65,0.45);
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>

  <canvas id="c"></canvas>

  <header class="page-header">
    <a href="https://sheisone1.github.io/string-curtain/index.html?open=1" class="back-link">← Back</a>
    <h1 class="page-title">Creators</h1>
  </header>

  <div class="creator-labels">
    <div class="creator-label">
      <span class="name">Shiri Arbiv</span>
      <span class="role">Director</span>
    </div>
    <div class="creator-label">
      <span class="name">Maya Cohen</span>
      <span class="role">Composer</span>
    </div>
    <div class="creator-label">
      <span class="name">Lior Ben-David</span>
      <span class="role">Animator</span>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    let W, H, dpr;

    const PASSES = [[14, 0.028], [7, 0.060], [3, 0.17], [1, 0.75]];

    // Reference: 4 concentric rings, each made of 2 interweaving strands
    const N_RINGS = 4;
    const N_TWIST = 24; // twist cycles per full circle

    function resize() {
      dpr = window.devicePixelRatio || 1;
      W = window.innerWidth;
      H = window.innerHeight;
      canvas.width  = Math.round(W * dpr);
      canvas.height = Math.round(H * dpr);
      canvas.style.width  = W + 'px';
      canvas.style.height = H + 'px';
      ctx.scale(dpr, dpr);
    }

    // One ring: 2 interweaving strands offset by π → they cross = twisted rope texture
    function drawRopeRing(cx, cy, R, ropeHalf, time, phase) {
      const steps = Math.max(240, Math.round(R * 5));

      for (let strand = 0; strand < 2; strand++) {
        const sph = phase + strand * Math.PI; // opposite phase → strands cross

        for (const [lw, alpha] of PASSES) {
          ctx.beginPath();
          ctx.strokeStyle = `rgba(210,168,65,${alpha})`;
          ctx.lineWidth   = lw;
          for (let s = 0; s <= steps; s++) {
            const a   = (s / steps) * Math.PI * 2;
            const off = Math.sin(a * N_TWIST + time * 0.00038 + sph) * ropeHalf;
            const r   = R + off;
            const x   = cx + r * Math.cos(a);
            const y   = cy + r * Math.sin(a);
            s === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
          }
          ctx.stroke();
        }
      }
    }

    // Full coil: 4 concentric rings, hollow centre (~38% of outer radius)
    function drawRopeCoil(cx, cy, outerR, time, basePh) {
      const innerR   = outerR * 0.58;  // bigger hollow centre for image
      const spacing  = (outerR - innerR) / (N_RINGS - 1);
      const ropeHalf = spacing * 0.46;

      for (let ri = 0; ri < N_RINGS; ri++) {
        const R     = innerR + ri * spacing;
        const phase = basePh + ri * 1.1;
        drawRopeRing(cx, cy, R, ropeHalf, time, phase);
      }
    }

    const CREATORS = [
      { name: 'Shiri Arbiv',   role: 'Director',  lines: ['Visual storyteller', 'Tel Aviv, IL'] },
      { name: 'Maya Cohen',    role: 'Composer',   lines: ['Sound & score',      'Jerusalem, IL'] },
      { name: 'Lior Ben-David', role: 'Animator',  lines: ['Motion & form',      'Haifa, IL'] },
    ];

    // Draw one horizontal wavy thread line
    function drawHThread(x0, x1, y, time, phase) {
      for (const [lw, alpha] of PASSES) {
        ctx.beginPath();
        ctx.strokeStyle = `rgba(210,168,65,${alpha})`;
        ctx.lineWidth   = lw;
        for (let x = x0; x <= x1; x += 2) {
          const wy = y + Math.sin(x * 0.012 + time * 0.001 + phase) * 2;
          x === x0 ? ctx.moveTo(x, wy) : ctx.lineTo(x, wy);
        }
        ctx.stroke();
      }
    }

    // Draw one vertical wavy thread line
    function drawVThread(x, y0, y1, time, phase) {
      for (const [lw, alpha] of PASSES) {
        ctx.beginPath();
        ctx.strokeStyle = `rgba(210,168,65,${alpha})`;
        ctx.lineWidth   = lw;
        for (let y = y0; y <= y1; y += 2) {
          const wx = x + Math.sin(y * 0.012 + time * 0.001 + phase) * 2;
          y === y0 ? ctx.moveTo(wx, y) : ctx.lineTo(wx, y);
        }
        ctx.stroke();
      }
    }

    // Draw a thread-border box with text inside
    function drawInfoBox(cx, top, w, h, time, phase, creator) {
      const left  = cx - w / 2;
      const right = cx + w / 2;
      const bot   = top + h;

      drawHThread(left, right, top,  time, phase);
      drawHThread(left, right, bot,  time, phase + 1.6);
      drawVThread(left,  top, bot,   time, phase + 0.9);
      drawVThread(right, top, bot,   time, phase + 2.5);

      // Text inside
      ctx.textAlign    = 'center';
      ctx.fillStyle    = 'rgba(210,168,65,0.85)';
      ctx.font         = `18px "Imperial Script", cursive`;
      ctx.fillText(creator.role, cx, top + h * 0.38);

      ctx.fillStyle = 'rgba(210,168,65,0.45)';
      ctx.font      = `13px "Imperial Script", cursive`;
      creator.lines.forEach((line, i) => {
        ctx.fillText(line, cx, top + h * 0.65 + i * 16);
      });
    }

    const labels = document.querySelector('.creator-labels');

    function draw(time) {
      ctx.clearRect(0, 0, W, H);

      const HEADER_H = 60;
      const FOOTER_H = 20;
      const usableH  = H - HEADER_H - FOOTER_H;
      const cy       = HEADER_H + usableH * 0.5;
      const R        = Math.min(W * 0.10, usableH * 0.34);

      // Position labels 10px above top edge of coil
      const labelH = 90;
      labels.style.top = (cy - R - 10 - labelH) + 'px';

      const positions = [W / 6, W / 2, W * 5 / 6];
      const phases    = [0, 2.09, 4.19];

      const BOX_W = R * 2.0;
      const BOX_H = R * 0.55;
      const BOX_GAP = 25;

      positions.forEach((cx, i) => {
        drawRopeCoil(cx, cy, R, time, phases[i]);
        drawInfoBox(cx, cy + R + BOX_GAP, BOX_W, BOX_H, time, phases[i], CREATORS[i]);
      });

      requestAnimationFrame(draw);
    }

    window.addEventListener('resize', () => { resize(); });
    resize();
    requestAnimationFrame(draw);
  </script>

</body>
</html>
