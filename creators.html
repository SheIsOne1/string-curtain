<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Bella — Creators</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Imperial+Script&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }

    canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    .page-header {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 60px;
      display: flex;
      align-items: center;
      padding: 0 32px;
      gap: 24px;
      z-index: 10;
    }

    .back-link {
      font-family: 'Imperial Script', cursive;
      font-size: 18px;
      color: rgba(210,168,65,0.65);
      text-decoration: none;
      transition: color 0.2s;
    }
    .back-link:hover { color: rgba(210,168,65,1); }

    .page-title {
      font-family: 'Imperial Script', cursive;
      font-size: 38px;
      color: rgba(210,168,65,0.9);
      font-weight: 400;
    }

    .creator-labels {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 90px;
      display: flex;
      z-index: 10;
      pointer-events: none;
    }

    .creator-label {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }

    .creator-label .name {
      font-family: 'Imperial Script', cursive;
      font-size: 30px;
      color: rgba(210,168,65,0.92);
    }

    .creator-label .role {
      font-family: 'Imperial Script', cursive;
      font-size: 15px;
      color: rgba(210,168,65,0.45);
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>

  <canvas id="c"></canvas>

  <header class="page-header">
    <a href="https://sheisone1.github.io/string-curtain/index.html?open=1" class="back-link">← Back</a>
    <h1 class="page-title">Creators</h1>
  </header>

  <div class="creator-labels">
    <div class="creator-label">
      <span class="name">Shiri Arbiv</span>
      <span class="role">Director</span>
    </div>
    <div class="creator-label">
      <span class="name">Maya Cohen</span>
      <span class="role">Composer</span>
    </div>
    <div class="creator-label">
      <span class="name">Lior Ben-David</span>
      <span class="role">Animator</span>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    let W, H, dpr;

    const PASSES = [[14, 0.028], [7, 0.060], [3, 0.17], [1, 0.75]];

    // N_TWIST: how many "bumps" (rope twist texture) appear per full circle
    const N_TWIST = 28;
    const N_RINGS = 5;   // concentric rings per coil, matching reference

    function resize() {
      dpr = window.devicePixelRatio || 1;
      W = window.innerWidth;
      H = window.innerHeight;
      canvas.width  = Math.round(W * dpr);
      canvas.height = Math.round(H * dpr);
      canvas.style.width  = W + 'px';
      canvas.style.height = H + 'px';
      ctx.scale(dpr, dpr);
    }

    // Draw one concentric ring with twisted-rope texture
    function drawRopeRing(cx, cy, r, time, phase) {
      const steps   = Math.max(180, Math.round(r * 4));
      const twistAmp = r * 0.022;   // radial oscillation → rope-twist illusion

      for (const [lw, alpha] of PASSES) {
        ctx.beginPath();
        ctx.strokeStyle = `rgba(210,168,65,${alpha})`;
        ctx.lineWidth   = lw;
        for (let s = 0; s <= steps; s++) {
          const a  = (s / steps) * Math.PI * 2;
          // Radial oscillation gives the twisted-rope look
          const rr = r
            + Math.sin(a * N_TWIST + time * 0.00045 + phase) * twistAmp
            + Math.sin(a * N_TWIST * 0.5 + time * 0.00030 + phase * 1.3) * twistAmp * 0.4;
          const x = cx + rr * Math.cos(a);
          const y = cy + rr * Math.sin(a);
          s === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        }
        ctx.stroke();
      }
    }

    // Draw a full rope coil (5 concentric rings, hollow center like reference)
    function drawRopeCoil(cx, cy, outerR, time, basePh) {
      const innerR  = outerR * 0.30;                      // hollow centre
      const spacing = (outerR - innerR) / (N_RINGS - 1);  // gap between ring centres

      for (let ri = 0; ri < N_RINGS; ri++) {
        const r     = innerR + ri * spacing;
        const phase = basePh + ri * 1.05;
        drawRopeRing(cx, cy, r, time, phase);
      }
    }

    function draw(time) {
      ctx.clearRect(0, 0, W, H);

      const HEADER_H = 60;
      const FOOTER_H = 90;
      const usableH  = H - HEADER_H - FOOTER_H;
      const cy       = HEADER_H + usableH * 0.5;
      const R        = Math.min(W * 0.13, usableH * 0.42);

      const positions = [W / 6, W / 2, W * 5 / 6];
      const phases    = [0, 2.09, 4.19];

      positions.forEach((cx, i) => drawRopeCoil(cx, cy, R, time, phases[i]));

      requestAnimationFrame(draw);
    }

    window.addEventListener('resize', () => { resize(); });
    resize();
    requestAnimationFrame(draw);
  </script>

</body>
</html>
