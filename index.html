<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Bella</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat+Brush&family=Imperial+Script&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <!-- Sections (behind canvas — revealed when canvas fades out) -->
  <div class="sections" id="sections">
    <div class="section s1" id="sec0"><h3>Our Story</h3></div>
    <div class="section s2" id="sec1"><h3>Making Of</h3></div>
    <div class="section s3" id="sec2"><h3>creators</h3></div>
    <div class="section s4" id="sec3"><h3>Awards</h3></div>
  </div>

  <!-- Titles Overlay (above canvas) -->
  <div class="titles-overlay" id="titlesOverlay">
    <div class="title-item" id="title0"><span class="title-text">Our Story</span></div>
    <div class="title-item" id="title1"><span class="title-text">Making Of</span></div>
    <div class="title-item" id="title2"><span class="title-text">creators</span></div>
    <div class="title-item" id="title3"><span class="title-text">Awards</span></div>
  </div>

  <!-- Canvas -->
  <canvas id="c"></canvas>

  <script src="script.js"></script>
</body>
</html>
