<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Bella</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>

<body>

  <!-- Titles Overlay (above curtain canvas) -->
  <div class="titles-overlay" id="titlesOverlay">
    <div class="title-item" id="title0"><span class="title-text">Our Story</span></div>
    <div class="title-item" id="title1"><span class="title-text">Making Of</span></div>
    <div class="title-item" id="title2"><span class="title-text">creators</span></div>
    <div class="title-item" id="title3"><span class="title-text">Awards</span></div>
  </div>

  <!-- Hibiscus flower animation canvas (inline, revealed when curtain opens) -->
  <canvas id="hibiscus"></canvas>

  <!-- Curtain canvas -->
  <canvas id="c"></canvas>

  <script src="script.js"></script>
  <script>
    // Reset canvas opacity when navigating back via browser back button
    window.addEventListener("pageshow", e => {
      if (e.persisted) window.location.reload();
    });
  </script>
  <script type="module">
    import { startHibiscus } from './hibiscus.js';
    window.__startHibiscus = startHibiscus;
    if (window.__onHibiscusReady) window.__onHibiscusReady();
  </script>
</body>
</html>
