<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Bella — Making Of</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="section.css">
  <style>
    html, body {
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    #filmCanvas {
      position: fixed;
      left: 0;
      top: 72px;
      width: 100%;
      height: calc(100% - 72px);
      display: block;
      z-index: 0;
      pointer-events: none;
    }

    .film-content {
      position: fixed;
      left: 0;
      top: 72px;
      width: 100%;
      height: calc(100% - 72px);
      z-index: 2;
      pointer-events: none;
    }

    .frame {
      position: absolute;
      display: flex;
      flex-direction: column;
    }

    .frame-title {
      font-family: "Playfair Display", serif;
      font-weight: 400;
      color: rgba(210,168,65,0.92);
      text-shadow:
        0 0 40px rgba(210,168,65,0.35),
        0 0 90px rgba(210,168,65,0.12);
      line-height: 1;
      white-space: nowrap;
      text-align: center;
      width: 100%;
    }

    .frame-title-row {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .frame-slots-row {
      display: flex;
      flex: 1;
      min-height: 0;
    }

    .img-slot {
      flex: 1;
      border: none;
      background: rgba(210,168,65,0.03);
      min-width: 0;
    }

    #timecode {
      position: fixed;
      bottom: 18px;
      right: 24px;
      font-family: 'Courier New', monospace;
      font-size: 9px;
      letter-spacing: 0.25em;
      color: rgba(210,168,65,0.22);
      z-index: 5;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <header class="page-header">
    <a href="https://sheisone1.github.io/string-curtain/index.html?open=1" class="back-link">← Back</a>
    <h1 class="page-title">Making Of</h1>
  </header>

  <canvas id="filmCanvas"></canvas>

  <div class="film-content" id="filmContent">

    <div class="frame" id="frame1">
      <div class="frame-title-row"><div class="frame-title" id="ft1">The Idea</div></div>
      <div class="frame-slots-row" id="slots1">
        <div class="img-slot"></div>
        <div class="img-slot"></div>
        <div class="img-slot"></div>
        <div class="img-slot"></div>
        <div class="img-slot"></div>
        <div class="img-slot"></div>
      </div>
    </div>

    <div class="frame" id="frame2">
      <div class="frame-title-row"><div class="frame-title" id="ft2">The Light</div></div>
      <div class="frame-slots-row" id="slots2">
        <div class="img-slot"></div>
        <div class="img-slot"></div>
        <div class="img-slot"></div>
        <div class="img-slot"></div>
        <div class="img-slot"></div>
        <div class="img-slot"></div>
      </div>
    </div>

    <div class="frame" id="frame3">
      <div class="frame-title-row"><div class="frame-title" id="ft3">The Edit</div></div>
      <div class="frame-slots-row" id="slots3">
        <div class="img-slot"></div>
        <div class="img-slot"></div>
        <div class="img-slot"></div>
        <div class="img-slot"></div>
        <div class="img-slot"></div>
        <div class="img-slot"></div>
      </div>
    </div>

  </div>

  <div id="timecode">00:00:00:00</div>

  <script>
    (function () {
      const canvas = document.getElementById('filmCanvas');
      const ctx    = canvas.getContext('2d');

      const STRIP_H  = 54;
      const PAIR_GAP = STRIP_H;
      const HOLE_W   = 22;
      const HOLE_H   = 16;
      const HOLE_GAP = 52;
      const TITLE_H  = 36; // height reserved for frame title row

      const phases = [0, 0.8, 1.6, 2.4, 3.2, 4.0, 4.8, 5.6];

      let W = 0, H = 0, dpr = 1;
      let frameRects = []; // [{top, bottom, slotsTop, slotsBottom}]

      // ── Multi-pass golden glow horizontal thread ──────────────────────────
      function drawThread(yPos, time, phase) {
        const passes = [[14, 0.028], [7, 0.060], [3, 0.17], [1, 0.75]];
        for (const [lw, alpha] of passes) {
          ctx.beginPath();
          ctx.strokeStyle = `rgba(210,168,65,${alpha})`;
          ctx.lineWidth = lw;
          for (let x = 0; x <= W; x += 2) {
            const y = yPos + Math.sin(x * 0.008 + time * 0.001 + phase) * 3;
            x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
          }
          ctx.stroke();
        }
      }

      // ── Multi-pass golden glow vertical thread ─────────────────────────────
      function drawVerticalThread(xPos, yTop, yBottom, time, phase) {
        const passes = [[14, 0.028], [7, 0.060], [3, 0.17], [1, 0.75]];
        for (const [lw, alpha] of passes) {
          ctx.beginPath();
          ctx.strokeStyle = `rgba(210,168,65,${alpha})`;
          ctx.lineWidth = lw;
          for (let y = yTop; y <= yBottom; y += 2) {
            const x = xPos
              + Math.sin(y * 0.012 + time * 0.0005  + phase) * 3
              + Math.sin(y * 0.028 + time * 0.0008 + phase * 1.4) * 1.5;
            y === yTop ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
          }
          ctx.stroke();
        }
      }

      // ── Glowing rounded-rect sprocket hole ───────────────────────────────
      function drawHole(x, y) {
        const passes = [[4, 0.04], [2, 0.12], [1, 0.32], [0.5, 0.72]];
        for (const [lw, alpha] of passes) {
          ctx.beginPath();
          ctx.strokeStyle = `rgba(210,168,65,${alpha})`;
          ctx.lineWidth = lw;
          ctx.roundRect(x, y, HOLE_W, HOLE_H, 3);
          ctx.stroke();
        }
      }

      // ── Draw sprocket holes in a strip ────────────────────────────────────
      function drawSprocketStrip(stripCenterY, scrollX) {
        const holeY = stripCenterY - HOLE_H / 2;
        const count = Math.ceil(W / HOLE_GAP) + 2;
        const offset = scrollX % HOLE_GAP;
        for (let i = -1; i < count; i++) {
          const x = i * HOLE_GAP + offset + 8;
          drawHole(x, holeY);
        }
      }

      // ── 8 thread line Y positions ─────────────────────────────────────────
      function linePositions() {
        const innerH = H - STRIP_H * 2;
        const frameH = (innerH - PAIR_GAP * 2) / 3;
        const y2 = STRIP_H;
        const y3 = y2 + frameH;
        const y4 = y3 + PAIR_GAP;
        const y5 = y4 + frameH;
        const y6 = y5 + PAIR_GAP;
        return [
          0,
          y2,
          y3,
          y4,
          y5,
          y6,
          H - STRIP_H,
          H - 1,
        ];
      }

      // ── Position frame divs and image slots ───────────────────────────────
      function layoutFrames() {
        const ys = linePositions();
        const configs = [
          { el: document.getElementById('frame1'), top: ys[1], bottom: ys[2] },
          { el: document.getElementById('frame2'), top: ys[3], bottom: ys[4] },
          { el: document.getElementById('frame3'), top: ys[5], bottom: ys[6] },
        ];

        frameRects = [];

        configs.forEach(({ el, top, bottom }) => {
          el.style.left   = '0';
          el.style.width  = W + 'px';
          el.style.top    = top + 'px';
          el.style.height = (bottom - top) + 'px';

          // Title row height
          const titleRow = el.querySelector('.frame-title-row');
          titleRow.style.height = TITLE_H + 'px';

          frameRects.push({
            top,
            bottom,
            slotsTop: top + TITLE_H,
            slotsBottom: bottom,
          });
        });

        fitTitles();
      }

      // ── Auto-size frame titles (capped at 18px = 50% of 36) ─────────────
      function fitTitles() {
        const probe = document.createElement('span');
        probe.style.cssText = 'position:fixed;top:-9999px;left:-9999px;visibility:hidden;white-space:nowrap;font-family:"Playfair Display",serif;font-weight:400;';
        document.body.appendChild(probe);

        const MAX_SIZE = 18;
        const target   = W * 0.14;

        document.querySelectorAll('.frame-title').forEach(el => {
          probe.textContent = el.textContent;
          let fs = 6;
          probe.style.fontSize = fs + 'px';
          while (probe.offsetWidth < target && fs < MAX_SIZE) {
            fs += 0.5;
            probe.style.fontSize = fs + 'px';
          }
          el.style.fontSize = Math.min(fs - 0.5, MAX_SIZE) + 'px';
        });

        document.body.removeChild(probe);
      }

      // ── Resize ────────────────────────────────────────────────────────────
      function resize() {
        dpr = window.devicePixelRatio || 1;
        W   = canvas.clientWidth;
        H   = canvas.clientHeight;
        canvas.width  = Math.round(W * dpr);
        canvas.height = Math.round(H * dpr);
        ctx.scale(dpr, dpr);
        layoutFrames();
      }

      // ── Timecode ticker ───────────────────────────────────────────────────
      const tcEl = document.getElementById('timecode');
      let tcFrames = 0;
      function tickTimecode() {
        tcFrames++;
        const fr = tcFrames % 24;
        const s  = Math.floor(tcFrames / 24) % 60;
        const m  = Math.floor(tcFrames / 1440) % 60;
        const h  = Math.floor(tcFrames / 86400);
        const pad = n => String(n).padStart(2,'0');
        tcEl.textContent = `${pad(h)}:${pad(m)}:${pad(s)}:${pad(fr)}`;
      }

      // ── Animation loop ────────────────────────────────────────────────────
      let scrollX = 0;

      function draw(time) {
        ctx.clearRect(0, 0, W, H);

        scrollX = time * 0.010;

        const ys = linePositions();

        // Draw 8 horizontal thread lines
        ys.forEach((y, i) => drawThread(y, time, phases[i]));

        // Sprocket holes in all 4 strips
        drawSprocketStrip(STRIP_H / 2, scrollX);
        drawSprocketStrip((ys[2] + ys[3]) / 2, scrollX);
        drawSprocketStrip((ys[4] + ys[5]) / 2, scrollX);
        drawSprocketStrip(H - STRIP_H / 2, scrollX);

        // Draw 5 vertical thread dividers per frame (6 equal image slots)
        frameRects.forEach((fr, fi) => {
          const slotW = W / 6;
          for (let i = 1; i <= 5; i++) {
            const x = slotW * i;
            const phase = phases[(fi * 5 + i) % phases.length];
            drawVerticalThread(x, fr.slotsTop, fr.slotsBottom, time, phase);
          }
        });

        tickTimecode();
        requestAnimationFrame(draw);
      }

      window.addEventListener('resize', resize);
      resize();
      requestAnimationFrame(draw);
    })();
  </script>
</body>
</html>
